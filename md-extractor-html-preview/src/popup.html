<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD Extractor & HTML Preview</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
        <span>MD Extractor & HTML Preview</span>
      </div>
      <div class="actions">
        <button id="extract-btn" class="btn primary-btn" title="Extract Page Content">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="8 17 12 21 16 17"></polyline>
            <line x1="12" y1="12" x2="12" y2="21"></line>
            <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"></path>
          </svg>
          Extract
        </button>
      </div>
    </header>

    <div class="toolbar">
      <div class="tabs">
        <button class="tab-btn active" data-target="editor-pane">Markdown</button>
        <button class="tab-btn" data-target="preview-pane">Preview</button>
      </div>
      <div class="tools">
        <select id="theme-select" class="select-css">
          <option value="default">Clean Default</option>
          <option value="editorial">Kami Editorial (Magazine)</option>
          <option value="swiss-deck">Swiss Deck (Presentation)</option>
          <option value="poster-neon">Neon Poster (Card)</option>
        </select>
        <button id="download-btn" class="btn icon-btn" title="Download Image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
        </button>
        <button id="copy-btn" class="btn icon-btn" title="Copy Content">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        </button>
      </div>
    </div>

    <main class="content-area">
      <!-- Editor Pane -->
      <div id="editor-pane" class="pane active">
        <textarea id="markdown-input" placeholder="Enter Markdown here or click 'Extract' to pull from the current page..."></textarea>
      </div>
      
      <!-- Preview Pane -->
      <div id="preview-pane" class="pane">
        <iframe id="markdown-preview" sandbox="allow-scripts allow-same-origin" style="width: 100%; height: 100%; border: none; border-radius: 8px; background: var(--panel-bg);"></iframe>
      </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast" class="toast hidden">Copied to clipboard!</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
